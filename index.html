<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Polymathic Industries</title>

<style>
/* ——————————————————————————————————————————————— */
/* GLOBAL THEME */
/* ——————————————————————————————————————————————— */
:root {
  --bg: #070010;
  --bg-alt: #120021;
  --accent: #b38cff;
  --text: #f7f3ff;
  --muted: #c3b6e6;
  --border-subtle: rgba(255,255,255,0.08);
  --pill: rgba(255,255,255,0.06);
  --radius-lg: 24px;
  --radius-md: 18px;
  --shadow-soft: 0 24px 80px rgba(0,0,0,0.7);
  --max-width: 1120px;
}

* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text","Segoe UI", sans-serif;
  background: radial-gradient(circle at top, #2a0050 0, #050008 55%, #020005 100%);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }
main { min-height: 100vh; }
.site-shell {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 0 20px;
}

/* ——————————————————————————————————————————————— */
/* HEADER + LOGO */
/* ——————————————————————————————————————————————— */
header {
  position: sticky;
  top: 0;
  z-index: 20;
  backdrop-filter: blur(16px);
  background: linear-gradient(to bottom, rgba(5,0,16,0.92), rgba(5,0,16,0.7), transparent);
}
.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 14px 0 10px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

/* Option B — Silver π on soft radial purple gradient */
.brand-logo-wrap {
  width: 46px;
  height: 46px;
  border-radius: 14px;
  background: radial-gradient(circle at center, #7a3cff 0%, #2a0050 90%);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow:
    0 0 0 0 rgba(255,255,255,0),
    0 12px 40px rgba(0,0,0,0.9);
  animation: piGlow 4s ease-in-out infinite;
}

.brand-logo-pi {
  font-size: 26px;
  font-weight: 700;
  color: #e6e6e6;
  text-shadow:
    0 0 8px rgba(255,255,255,0.8),
    0 0 18px rgba(255,255,255,0.6),
    0 0 32px rgba(255,255,255,0.4);
}

/* Medium bloom glow */
@keyframes piGlow {
  0% {
    box-shadow: 0 0 0 0 rgba(255,255,255,0), 0 12px 40px rgba(0,0,0,0.9);
  }
  40% {
    box-shadow: 0 0 26px 10px rgba(255,255,255,0.55), 0 18px 60px rgba(0,0,0,1);
  }
  70% {
    box-shadow: 0 0 32px 14px rgba(255,255,255,0.35), 0 16px 52px rgba(0,0,0,0.95);
  }
  100% {
    box-shadow: 0 0 0 0 rgba(255,255,255,0), 0 12px 40px rgba(0,0,0,0.9);
  }
}

.brand-text {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.brand-name {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--muted);
}
.brand-tagline {
  font-size: 12px;
  color: var(--muted);
}

nav {
  display: flex;
  align-items: center;
  gap: 14px;
  font-size: 13px;
  color: var(--muted);
}
.nav-link {
  padding: 6px 10px;
  border-radius: 999px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: background .18s, border-color .18s, color .18s;
}
.nav-link:hover {
  background: rgba(255,255,255,0.04);
  border-color: rgba(255,255,255,0.12);
  color: var(--text);
}
.nav-cta {
  padding: 7px 14px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.18);
  background: linear-gradient(135deg, rgba(179,140,255,0.18), rgba(255,255,255,0.02));
  color: var(--text);
  font-size: 12px;
  font-weight: 500;
}

/* ——————————————————————————————————————————————— */
/* HERO SECTION */
/* ——————————————————————————————————————————————— */
.hero { padding: 32px 0 28px; }
.hero-inner {
  border-radius: var(--radius-lg);
  padding: 24px 24px 26px;
  background: radial-gradient(circle at top left, rgba(179,140,255,0.22), transparent 55%),
              linear-gradient(145deg, rgba(10,0,30,0.96), rgba(4,0,16,0.98));
  border: 1px solid var(--border-subtle);
  box-shadow: var(--shadow-soft);
  display: grid;
  grid-template-columns: minmax(0,1.1fr) minmax(0,1fr);
  gap: 24px;
  align-items: center;
}

.hero-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 4px 10px;
  border-radius: 999px;
  background: var(--pill);
  border: 1px solid rgba(255,255,255,0.08);
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 10px;
}
.hero-pill-dot {
  width: 7px;
  height: 7px;
  border-radius: 999px;
  background: #5be7a9;
  box-shadow: 0 0 0 4px rgba(91,231,169,0.18);
}

.hero-title {
  font-size: clamp(30px, 4vw, 38px);
  line-height: 1.05;
  letter-spacing: 0.02em;
  margin: 0 0 8px;
}
.hero-subtitle {
  font-size: 15px;
  color: var(--muted);
  max-width: 520px;
  margin-bottom: 12px;
}
.hero-note {
  font-size: 12px;
  color: var(--muted);
}

.hero-visual {
  position: relative;
  min-height: 220px;
  border-radius: var(--radius-md);
  background: radial-gradient(circle at top, rgba(179,140,255,0.3), transparent 60%),
              linear-gradient(160deg, #1b022f, #050008);
  border: 1px solid rgba(255,255,255,0.08);
  overflow: hidden;
}
.hero-visual .canvas-wrap {
  width: 100%;
  height: 100%;
}

/* ——————————————————————————————————————————————— */
/* PRODUCT SECTIONS */
/* ——————————————————————————————————————————————— */
.section-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--muted);
  margin-bottom: 6px;
}

.product-section {
  position: relative;
  margin: 24px 0;
  border-radius: var(--radius-lg);
  overflow: hidden;
  border: 1px solid var(--border-subtle);
  background: linear-gradient(145deg, var(--bg-alt), #050008);
  box-shadow: var(--shadow-soft);
  cursor: pointer;
  transition: transform .25s, box-shadow .25s, border-color .25s;
}
.product-section:hover {
  transform: translateY(-4px);
  box-shadow: 0 28px 90px rgba(0,0,0,0.85);
  border-color: rgba(179,140,255,0.6);
}

.product-inner {
  display: grid;
  grid-template-columns: minmax(0,1.1fr) minmax(0,1fr);
  gap: 24px;
  padding: 26px 24px;
  align-items: center;
}

.product-text-sub {
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--muted);
  margin-bottom: 8px;
}
.product-text-title {
  font-size: 20px;
  margin-bottom: 8px;
}
.product-text-body {
  font-size: 14px;
  color: var(--muted);
  max-width: 520px;
}
.product-cta {
  margin-top: 14px;
  font-size: 12px;
  color: var(--accent);
}

.product-visual {
  position: relative;
  min-height: 220px;
  border-radius: var(--radius-md);
  background: radial-gradient(circle at top, rgba(179,140,255,0.3), transparent 60%),
              linear-gradient(160deg, #1b022f, #050008);
  border: 1px solid rgba(255,255,255,0.08);
  overflow: hidden;
}

.product-full {
  min-height: 100vh;
  display: flex;
  align-items: center;
}
.product-half {
  min-height: 50vh;
  display: flex;
  align-items: center;
}

/* ——————————————————————————————————————————————— */
/* CANVAS WRAPPERS */
/* ——————————————————————————————————————————————— */
.canvas-wrap {
  width: 100%;
  height: 100%;
  position: relative;
}
.canvas-wrap canvas {
  width: 100%;
  height: 100%;
  display: block;
}

/* ——————————————————————————————————————————————— */
/* CARBIQ VISUAL */
/* ——————————————————————————————————————————————— */
.carbiq-visual {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  gap: 18px;
}
.carbiq-icon {
  width: 64px;
  height: 64px;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 16px 40px rgba(0,0,0,0.8);
}
.carbiq-icon img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.carbiq-glow {
  position: absolute;
  width: 220px;
  height: 220px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(179, 140, 255, 0.4), transparent 70%);
  filter: blur(6px);
  opacity: 0.8;
}

.carbiq-calculator {
  width: 150px;
  height: 210px;
  border-radius: 22px;
  background: linear-gradient(145deg, #ffffff, #d9d0ff);
  box-shadow: 0 22px 50px rgba(0, 0, 0, 0.85);
  position: relative;
  padding: 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.carbiq-screen {
  height: 42px;
  border-radius: 10px;
  background: linear-gradient(145deg, #e9f7ff, #c7e4ff);
  display: flex;
  align-items: center;
  padding: 0 10px;
  font-family: "SF Mono", ui-monospace;
  font-size: 13px;
  color: #1b2330;
}

.carbiq-screen-text {
  white-space: nowrap;
  overflow: hidden;
  border-right: 2px solid rgba(27, 35, 48, 0.7);
  animation:
    carbiqType 2.2s steps(6, end) infinite,
    carbiqCaret 0.8s step-end infinite;
}

/* Typing animation shortened to sync with button presses */
@keyframes carbiqType {
  0%   { width: 0ch; }
  30%  { width: 2ch; } /* "1 " */
  55%  { width: 4ch; } /* "1 +4" */
  80%  { width: 6ch; } /* "1 + 4 + 5" */
  100% { width: 0ch; }
}

@keyframes carbiqCaret {
  0%, 100% { border-color: transparent; }
  50%      { border-color: rgba(27, 35, 48, 0.7); }
}

.carbiq-buttons {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}
.carbiq-btn {
  border-radius: 10px;
  background: linear-gradient(145deg, #f5f1ff, #d6cfff);
  box-shadow: 0 6px 14px rgba(0,0,0,0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  color: #2b2340;
  transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
}
.carbiq-btn.active {
  transform: translateY(2px);
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  background: linear-gradient(145deg, #e4ddff, #c5b8ff);
}

/* ——————————————————————————————————————————————— */
/* HARDWARE ORB */
/* ——————————————————————————————————————————————— */
.hardware-visual {
  display: flex;
  align-items: center;
  justify-content: center;
}
.hardware-stack {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
}
.hardware-orb {
  position: relative;
  width: 180px;
  height: 180px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255, 255, 255, 0.06), transparent 70%);
  box-shadow: 0 30px 80px rgba(0, 0, 0, 0.95);
  display: flex;
  align-items: center;
  justify-content: center;
}
.hardware-haze {
  position: absolute;
  inset: -20%;
  background:
    radial-gradient(circle at 20% 0%, rgba(255, 255, 255, 0.12), transparent 60%),
    radial-gradient(circle at 80% 100%, rgba(179, 140, 255, 0.18), transparent 65%);
  filter: blur(18px);
  opacity: 0.6;
}
.hardware-core {
  position: relative;
  width: 110px;
  height: 110px;
  border-radius: 50%;
  background: radial-gradient(circle at center, #ffffff, #dcd7ff 45%, #4b0082 100%);
  box-shadow:
    0 0 40px rgba(255, 255, 255, 0.7),
    0 0 90px rgba(179, 140, 255, 0.9);
  display: flex;
  align-items: center;
  justify-content: center;
}
.hardware-question {
  font-size: 60px;
  font-weight: 700;
  color: #ffffff;
  text-shadow:
    0 0 18px rgba(255, 255, 255, 0.9),
    0 0 40px rgba(179, 140, 255, 0.9);
}
.hardware-rays {
  position: absolute;
  inset: -40%;
  background: conic-gradient(
    from 0deg,
    rgba(255, 255, 255, 0.0),
    rgba(255, 255, 255, 0.22),
    rgba(255, 255, 255, 0.0),
    rgba(179, 140, 255, 0.3),
    rgba(255, 255, 255, 0.0)
  );
  mix-blend-mode: screen;
  opacity: 0.5;
  filter: blur(4px);
  animation: hardwareSpin 16s linear infinite;
}
